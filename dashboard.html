color:#1565c0;

}

.boxes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.box{
background:#fff;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.15);
transition:.3s;
}

.box:hover{
transform:translateY(-10px);
}

.box h2{
margin-bottom:20px;
color:#1565c0;
}

.box a{
display:inline-block;
margin-top:15px;
padding:12px 25px;
background:#1565c0;
color:white;
text-decoration:none;
border-radius:30px;
}

.box a:hover{
background:#0d47a1;
}

</style>
