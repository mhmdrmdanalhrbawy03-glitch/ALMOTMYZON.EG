<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الإدارة</title>

<link rel="stylesheet" href="style.css">

<style>

.container{
width:90%;
max-width:900px;
margin:40px auto;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:30px;
}

label{
display:block;
margin-top:20px;
font-weight:bold;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

textarea{
height:120px;
resize:vertical;
}

button{
margin-top:25px;
width:100%;
padding:15px;
background:#1565c0;
color:#fff;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

.preview{
margin-top:30px;
padding:20px;
background:#f5f5f5;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">🎓 منصة تانية بكالوريا</div>

</header>

<div class="container">

<h1>لوحة الإدارة</h1>

<label>إعلان المنصة</label>

<textarea id="announcement"></textarea>

<label>رقم الواتساب</label>

<input type="text" id="whatsapp">

<button onclick="saveData()">

حفظ البيانات

</button>

<div class="preview">

<h3>البيانات المحفوظة</h3>

<p id="showAnnouncement"></p>

<p id="showWhatsapp"></p>

</div>

</div>

<footer>

<p>

تصميم وتطوير

<b style="color:#FFD700;">

محمد رمضان الحرباوي

</b>

</p>

</footer>

<script>

function saveData(){

localStorage.setItem("announcement",
document.getElementById("announcement").value);

localStorage.setItem("whatsapp",
document.getElementById("whatsapp").value);

loadData();

alert("تم حفظ البيانات بنجاح");

}

function loadData(){

let ann=localStorage.getItem("announcement") || "";

let wa=localStorage.getItem("whatsapp") || "";

document.getElementById("announcement").value=ann;

document.getElementById("whatsapp").value=wa;

document.getElementById("showAnnouncement").innerHTML="<b>الإعلان:</b> "+ann;

document.getElementById("showWhatsapp").innerHTML="<b>واتساب:</b> "+wa;

}

loadData();

</script>

</body>

</html>
