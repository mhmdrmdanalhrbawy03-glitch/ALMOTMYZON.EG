<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>المحتوى التعليمي والكورسات - المتميزون</title>
                <!-- استدعاء أحدث إصدار من Tailwind CSS للتصميم العصري -->
                    <script src="https://jsdelivr.net"></script>
                        <!-- استدعاء مكتبة سيرفر Supabase لتشغيل قاعدة البيانات -->
                            <script src="https://jsdelivr.net"></script>
                                <style>
                                        .line-clamp-2 {
                                                    display: -webkit-box;
                                                                -webkit-line-clamp: 2;
                                                                            -webkit-box-orient: vertical;  
                                                                                        overflow: hidden;
                                                                                                }
                                                                                                    </style>
                                                                                                    </head>
                                                                                                    <body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

                                                                                                        <!-- شريط التنقل العلوي المحترف (Navbar) -->
                                                                                                            <nav class="bg-slate-900/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                                                                                                                    <a href="index.html" class="text-xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">منصة المتميزون 🎓</a>
                                                                                                                            <div class="flex gap-6 text-sm font-medium">
                                                                                                                                        <a href="index.html" class="text-slate-400 hover:text-white transition">الرئيسية</a>
                                                                                                                                                    <a href="courses.html" class="text-blue-400 border-b-2 border-blue-500 pb-1">الكورسات والملازم</a>
                                                                                                                                                                <a href="dashboard.html" class="text-slate-400 hover:text-white transition">لوحة المعلم</a>
                                                                                                                                                                        </div>
                                                                                                                                                                            </nav>

                                                                                                                                                                                <!-- رأس الصفحة والفلاتر الذكية -->
                                                                                                                                                                                    <header class="max-w-7xl mx-auto px-6 py-10">
                                                                                                                                                                                            <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-6 mb-8">
                                                                                                                                                                                                        <div>
                                                                                                                                                                                                                        <h1 class="text-3xl font-extrabold mb-2 bg-gradient-to-l from-white to-slate-300 bg-clip-text text-transparent">المحتوى الدراسي والكورسات</h1>
                                                                                                                                                                                                                                        <p class="text-slate-400 text-sm">تصفح شروحات الفيديو والملازم المرفوعة حديثًا من معلميك</p>
                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                            <!-- أزرار تصفية المحتوى التفاعلية -->
                                                                                                                                                                                                                                                                                        <div class="flex flex-wrap gap-2" id="filterContainer">
                                                                                                                                                                                                                                                                                                        <button onclick="filterContent('all')" id="btn-all" class="filter-btn bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-semibold transition shadow-lg shadow-blue-500/25 cursor-pointer">الكل</button>
                                                                                                                                                                                                                                                                                                                        <button onclick="filterContent('video')" id="btn-video" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-5 py-2 rounded-xl text-sm font-semibold text-slate-300 transition cursor-pointer">🎥 فيديوهات الشرح</button>
                                                                                                                                                                                                                                                                                                                                        <button onclick="filterContent('pdf')" id="btn-pdf" class="filter-btn bg-slate-900 hover:bg-slate-800 border border-slate-800 px-5 py-2 rounded-xl text-sm font-semibold text-slate-300 transition cursor-pointer">📄 الملازم والملخصات</button>
                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                </header>

                                                                                                                                                                                                                                                                                                                                                                    <!-- شبكة عرض المحتوى (Grid System) -->
                                                                                                                                                                                                                                                                                                                                                                        <main class="max-w-7xl mx-auto px-6 pb-20">
                                                                                                                                                                                                                                                                                                                                                                                <!-- مؤشر تحميل البيانات -->
                                                                                                                                                                                                                                                                                                                                                                                        <div id="loader" class="text-center py-20 flex flex-col items-center justify-center gap-3">
                                                                                                                                                                                                                                                                                                                                                                                                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                <p class="text-slate-400 font-medium text-sm">جاري جلب الدروس والملازم من السيرفر...</p>
                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                        <!-- الحاوية الأساسية للكروت -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- الكروت تتولد هنا ديناميكيًا من قاعدة البيانات -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- رسالة فارغة عند عدم وجود محتوى -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="noContent" class="text-center py-20 hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="text-slate-500 text-lg font-medium">لا يوجد محتوى متاح حاليًا في هذا القسم.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </main>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- نافذة العرض المنبثقة السينمائية لتشغيل الفيديو والملفات (Modal) -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="contentModal" class="fixed inset-0 bg-black/85 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="bg-slate-900 border border-slate-800 rounded-2xl max-w-3xl w-full p-6 relative shadow-2xl">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <button onclick="closeModal()" class="absolute top-4 left-4 bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white p-2.5 rounded-full text-xs font-bold transition cursor-pointer">✕</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h3 id="modalTitle" class="text-xl font-bold mb-4 ml-10 text-slate-100">عنوان المحتوى</h3>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div id="modalBody" class="w-full aspect-video rounded-xl overflow-hidden bg-black flex items-center justify-center border border-slate-800">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <!-- هنا يتم تحميل مشغل الفيديو أو زر تحميل الـ PDF -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <!-- السكريبت التشغيلي والربط الذكي مع قاعدة بياناتك -->
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // التوصيل المباشر بعنوان مشروعك على سوبابيز
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const SUPABASE_URL = "https://supabase.co";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // ضع مفتاح الـ anon public الخاص بك بين القوسين
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const SUPABASE_ANON_KEY = "قم_بوضع_مفتاح_ANON_الخاص_بك_هنا"; 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let globalLessons = [];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // 1. دالة جلب البيانات الفورية من جدول lessons
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        async function loadPlatformContent() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    try {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const { data, error } = await supabaseClient
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        .from('lessons')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            .select('*')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                .order('created_at', { ascending: false });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (error) throw error;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                globalLessons = data;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                renderCards(globalLessons);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            } catch (error) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            console.error("خطأ الربط:", error.message);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('loader').innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p class="text-red-400 font-medium">فشل الاتصال بقاعدة البيانات.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="text-slate-500 text-xs mt-1">تأكد من كتابة الـ ANON KEY بشكل صحيح داخل ملف الكود.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // 2. دالة بناء وعرض كروت المواد والفيديوهات
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function renderCards(lessonsList) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const grid = document.getElementById('coursesGrid');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const loader = document.getElementById('loader');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const noContent = document.getElementById('noContent');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    loader.classList.add('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                grid.innerHTML = '';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (lessonsList.length === 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            grid.classList.add('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            noContent.classList.remove('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    noContent.classList.add('hidden');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                grid.classList.remove('hidden');

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            lessonsList.forEach(item => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const card = document.createElement('div');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            card.className = "bg-slate-900/60 border border-slate-850 rounded-2xl p-5 hover:border-blue-500/50 hover:bg-slate-900 transition-all duration-300 flex flex-col justify-between group";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const isVideo = item.content_type === 'video';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const typeLabel = isVideo ? '🎥 فيديو شرح' : '📄 ملزمة PDF';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const badgeStyle = isVideo ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            card.innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="flex justify-between items-center mb-4">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <span class="text-xs font-semibold px-2.5 py-1 rounded-lg border ${badgeStyle}">${typeLabel}</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <span class="text-xs text-slate-500 bg-slate-950 px-2 py-1 rounded-md">${item.grade_level || 'كل الصفوف'}</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <h3 class="text-lg font-bold text-slate-100 mb-1 group-hover:text-blue-400 transition">${item.title}</h3>
